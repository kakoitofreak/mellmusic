<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Музыкальный плеер — для [Имя]</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <!-- Боковая панель с плейлистами -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-headphones"></i> Mellsic
        </div>
        <nav>
            <ul id="playlist-nav">
                <!-- Сюда будут динамически добавляться пункты плейлистов -->
            </ul>
        </nav>
    </aside>

    <!-- Основной контент: информация о плейлисте и список треков -->
    <main class="main-content">
        <div class="playlist-header">
            <img id="playlist-cover" src="images/default_playlist.jpg" alt="Playlist cover">
            <div class="playlist-info">
                <h1 id="playlist-title">Название плейлиста</h1>
                <p id="playlist-description">Плейлист, созданный специально для тебя</p>
                <button id="shuffle-btn" class="shuffle-btn">
                    <i class="fas fa-random"></i> Случайный трек
                </button>
            </div>
        </div>
        <div class="track-list" id="track-list">
            <!-- Треки будут отрисованы здесь -->
        </div>
    </main>

    <!-- Нижняя панель плеера -->
    <footer class="player-bar">
        <div class="track-info-mini">
            <img id="current-cover" src="images/default_track.jpg" alt="cover">
            <div>
                <div id="current-track-name">Не выбрано</div>
                <div id="current-artist"></div>
            </div>
        </div>
        <div class="player-controls">
            <button id="repeat"><i class="fas fa-redo-alt"></i></button>
            <button id="prev"><i class="fas fa-step-backward"></i></button>
            <button id="play-pause"><i class="fas fa-play"></i></button>
            <button id="next"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="progress-area">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" step="0.1">
            <span id="duration">0:00</span>
        </div>
        <div class="volume-area">
            <i class="fas fa-volume-up" id="volume-icon"></i>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
        </div>
    </footer>
</div>

<audio id="audio" preload="auto"></audio>

<script src="js/data.js"></script>
<script src="js/player.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
